name: Deploy Pereira Acabamentos to GCP

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 34.19.0.191
          username: pedrogabrielsilvaneto
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            export TZ="America/Sao_Paulo"
            cd ~/aura-system
            git pull origin master
            
            # Build Frontend
            cd frontend
            npm install
            npm run build
            
            # Setup Backend
            cd ../backend
            npm install --production
            
            # Restart Service
            pm2 restart aura-backend --update-env
            echo "✅ Sistema Pereira Acabamentos atualizado e reiniciado com sucesso!"
